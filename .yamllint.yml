---
extends: default
rules:
  line-length:
    max: 120
    level: warning
  document-start:
    present: true
  truthy:
    allowed-values: ["true", "false", "yes", "no"]
  comments:
    min-spaces-from-content: 1
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
ignore: |
  .env.example
  .env.test.example
  .env.docker
  .secrets.baseline
  .pre-commit-hooks/**
