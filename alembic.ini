# Alembic configuration for the Nimbus Commerce Platform.
#
# The actual database URL is read from the application
# settings at runtime in env.py. We do NOT hardcode it
# here so that the test/prod boundary is enforced by
# the application, not by the migration tool.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template for new migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Max identifier length.
truncate_slug_length = 40

# Don't generate a new file on each revision; we'll use explicit names.
revision_environment = false

# Timezone for timestamps.
timezone = UTC

# Max line length for autogenerated migration files.
max_line_length = 100

# SQLAlchemy URL is set programmatically in env.py from the
# application settings. The placeholder here is required by
# Alembic's config parser but is never used.
sqlalchemy.url = driver://user:pass@localhost/dbname
