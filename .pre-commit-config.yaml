---
# =============================================================================
# Nimbus Commerce Platform — pre-commit configuration
# =============================================================================
# Install once per developer:
#     pip install pre-commit
#     pre-commit install
#     pre-commit install --hook-type commit-msg
#
# Run manually against all files:
#     pre-commit run --all-files
#
# Update hook versions:
#     pre-commit autoupdate
#
# Bypass in an emergency (creates an audit trail via git notes):
#     git commit --no-verify
# =============================================================================

minimum_pre_commit_version: "3.5.0"

# Skip the slow hooks on merge commits and auto-generated commits.
# They are still required for the final squash / merge commit.
# skip: []

# Fail the commit if the working tree is dirty after a "fix" hook runs.
fail_fast: false

default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

repos:
  # ---------------------------------------------------------------------------
  # 1. General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: |
          (?x)^(
            .*\.min\.(js|css) |
            .*\.snap
          )$

      - id: end-of-file-fixer
        name: Ensure files end with a newline
        exclude: |
          (?x)^(
            .*\.min\.(js|css) |
            .*\.snap |
            .*\.png |
            .*\.jpg |
            .*\.jpeg |
            .*\.gif
          )$

      - id: mixed-line-ending
        name: Normalize line endings to LF
        args: [--fix=lf]

      - id: check-merge-conflict
        name: Block committing merge-conflict markers

      - id: check-added-large-files
        name: Block large files (>500 KiB)
        args: [--maxkb=500]

      - id: check-case-conflict
        name: Block filenames that differ only in case

      - id: check-yaml
        name: Validate YAML
        args: [--allow-multiple-documents]
        additional_dependencies: [pyyaml]

      - id: check-toml
        name: Validate pyproject.toml

      - id: check-json
        name: Validate JSON files
        exclude: |
          (?x)^(
            .*\.ipynb |
            .*/.vscode/.*
          )$

      - id: detect-private-key
        name: Block accidentally-committed private keys

  # ---------------------------------------------------------------------------
  # 2. Secrets scanning
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: ensure-secrets-baseline
        name: Nimbus — ensure detect-secrets baseline exists
        description: Creates .secrets.baseline if missing
        entry: >
          bash -c 'if [ ! -f .secrets.baseline ]; then
          detect-secrets scan . > .secrets.baseline || true;
          echo "[ensure-baseline] created .secrets.baseline"; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Scan for hardcoded secrets
        args:
          - --baseline=.secrets.baseline
          - --exclude-files=\.env\.example$
          - --exclude-files=\.env\.test\.example$
          - --exclude-files=\.env\.docker$
          - --exclude-files=tests/fixtures/.*

  # ---------------------------------------------------------------------------
  # 3. Python: ruff (lint + format) and mypy
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (strict)
        files: ^src/
        additional_dependencies:
          - pydantic~=2.10
          - pydantic-settings~=2.7
          - sqlalchemy~=2.0
          - types-redis
          - structlog~=24.4
          - fastapi
          - starlette
        args:
          - --strict
          - --no-incremental
          - --warn-unused-ignores
          - --warn-redundant-casts

  # ---------------------------------------------------------------------------
  # 4. Markdown, YAML, Shell — quality gates
  # ---------------------------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        name: markdownlint
        args: [--config, .markdownlint.json, --fix]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: yamllint
        args: [--config-file, .yamllint.yml, --strict]
        exclude: |
          (?x)^(
            .*\.env\.example |
            .*\.env\.test\.example |
            .*\.env\.docker
          )$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: shellcheck

  # ---------------------------------------------------------------------------
  # 5. Nimbus-specific local hooks
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: check-nimbus-env
        name: Nimbus — env file safety
        description: Refuses to commit populated .env files and verifies required keys
        entry: python .pre-commit-hooks/check-nimbus-env/hooks.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: check-no-prod-urls-in-source
        name: Nimbus — block production URLs in source
        description: Scans src/ and tests/ for production-looking hostnames
        entry: python .pre-commit-hooks/block-prod-urls.py
        language: system
        files: ^(src|tests)/.*\.(py|md|yaml|yml|toml|json)$
        pass_filenames: false
        stages: [pre-commit]
